title: "Jack Suzuki"
name: "Jack Suzuki"
description: "Technologist in Japan working across cybersecurity, infrastructure, and practical operations."
url: "https://jacksuzuki.com"
baseurl: ""
repository: "JackSuzukiMaybe/jacksuzuki.com"
timezone: "Asia/Tokyo"
locale: "en-US"

markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes@4.28.0"
minimal_mistakes_skin: "default"
search: false
atom_feed:
  hide: true

plugins:
  - jekyll-include-cache

include:
  - _pages

collections:
  projects:
    output: true
    permalink: /projects/:path/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
  - scope:
      path: ""
      type: projects
    values:
      layout: single
      author_profile: false
